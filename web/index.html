<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>同声传译</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>同声传译</h1>
          <span class="tagline">实时翻译 · 字幕 · 自动修正</span>
        </div>
      </div>

      <button class="lang-flow" id="langToggle" title="点击切换翻译方向">
        <span class="lang" id="langFrom">EN</span>
        <svg class="arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        <span class="lang accent" id="langTo">中文</span>
      </button>

      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span id="status">未连接</span>
      </div>
    </header>

    <!-- 控制条 -->
    <div class="controls">
      <button id="startBtn" class="btn btn-primary">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        开始
      </button>
      <label id="uploadBtn" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        上传文件
        <input type="file" id="fileInput" accept="audio/*,video/*" hidden />
      </label>
      <button id="stopBtn" class="btn btn-ghost" disabled>
        停止
      </button>
      <button id="ttsBtn" class="btn btn-ghost" title="开关语音播报">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        语音
      </button>
      <div class="spacer"></div>
      <div class="hint" id="hint">点击「开始」使用麦克风收音(需 Chrome),或上传音视频文件</div>
    </div>

    <!-- 视频预览 -->
    <div class="video-preview" id="videoPreview" hidden>
      <video id="previewPlayer" controls></video>
    </div>

    <!-- 音频频谱 -->
    <div class="spectrum-bar">
      <canvas id="spectrumCanvas"></canvas>
    </div>

    <!-- 文件上传进度 -->
    <div class="upload-bar" id="uploadBar" hidden>
      <div class="upload-info">
        <span class="upload-name" id="uploadName"></span>
        <span class="upload-status" id="uploadStatus"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- 字幕双栏 -->
    <main class="stage">
      <section class="pane">
        <div class="pane-head">
          <span class="pane-title">原文</span>
          <span class="pane-lang" id="sourceLang">English</span>
        </div>
        <div id="source" class="subtitles"></div>
        <div class="pane-empty" id="sourceEmpty">等待音频输入…</div>
      </section>

      <div class="divider"></div>

      <section class="pane">
        <div class="pane-head">
          <span class="pane-title">译文</span>
          <span class="pane-lang" id="targetLang">中文</span>
        </div>
        <div id="target" class="subtitles"></div>
        <div class="pane-empty" id="targetEmpty">译文将在这里实时出现…</div>
      </section>
    </main>

    <!-- 图例 -->
    <footer class="legend-bar">
      <span class="legend"><i class="dot committed"></i>已定稿</span>
      <span class="legend"><i class="dot pending"></i>临时(可能变化)</span>
      <span class="legend"><i class="dot corrected"></i>已修正</span>
      <div class="spacer"></div>
      <span class="legend muted" id="modeLabel">deepseek 模式</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
